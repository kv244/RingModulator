name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    permissions:
      contents: write   # required to create the GitHub release
    env:
      VERSION: ''   # populated by the "Extract version" step below

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$v" | Out-File -Append $env:GITHUB_ENV -Encoding utf8
          Write-Host "Version: $v"

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.13-windows-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: juce-8.0.13-windows-

      - name: Configure
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install WiX Toolset v4
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5

      - name: Build MSI
        run: >
          wix build installer/RingMod.wxs
          -d BuildArtefacts="${{ github.workspace }}\build\RingMod_artefacts\Release"
          -d Version=${{ env.VERSION }}
          -arch x64
          -ext WixToolset.UI.wixext/4.0.5
          -o RingMod-${{ github.ref_name }}-win64.msi

      - name: Zip VST3 bundle
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\RingMod_artefacts\Release\VST3\RingMod.vst3" `
            -DestinationPath "RingMod-${{ github.ref_name }}-VST3-win64.zip"

      - name: Create GitHub release
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            "RingMod-${{ github.ref_name }}-win64.msi" `
            "RingMod-${{ github.ref_name }}-VST3-win64.zip" `
            "build\RingMod_artefacts\Release\Standalone\RingMod.exe" `
            --title "RingMod ${{ github.ref_name }}" `
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
