name: Compile

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    name: Build (Windows / VST3 + Standalone + MSI)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Cache the JUCE FetchContent download and its build artefacts so
      # subsequent runs don't re-download or re-compile the entire framework.
      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.13-windows-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: juce-8.0.13-windows-

      - name: Configure
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify artefacts
        shell: pwsh
        run: |
          if (!(Test-Path "build/RingMod_artefacts/Release/VST3/RingMod.vst3")) {
            Write-Error "VST3 artefact missing"; exit 1
          }
          if (!(Test-Path "build/RingMod_artefacts/Release/Standalone/RingMod.exe")) {
            Write-Error "Standalone artefact missing"; exit 1
          }
          Write-Host "All artefacts present."

      # ── MSI packaging ────────────────────────────────────────────────────────
      # Pin to WiX 4.0.5 — v7+ requires the paid OSMF licence.
      # The .wxs file targets the v4 schema so 4.0.5 is the correct toolchain.
      - name: Install WiX Toolset v4
        run: |
          dotnet tool install --global wix --version 4.0.5
          wix extension add WixToolset.UI.wixext/4.0.5

      - name: Build MSI
        run: >
          wix build installer/RingMod.wxs
          -d BuildArtefacts="${{ github.workspace }}\build\RingMod_artefacts\Release"
          -arch x64
          -ext WixToolset.UI.wixext/4.0.5
          -o RingMod-1.1.0-win64.msi

      - name: Verify MSI
        shell: pwsh
        run: |
          if (!(Test-Path "RingMod-1.1.0-win64.msi")) {
            Write-Error "MSI not produced"; exit 1
          }
          $mb = [math]::Round((Get-Item "RingMod-1.1.0-win64.msi").Length / 1MB, 2)
          Write-Host "MSI size: $mb MB"

      # ── Upload artefacts ─────────────────────────────────────────────────────
      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: RingMod-VST3-windows
          path: build/RingMod_artefacts/Release/VST3/RingMod.vst3
          if-no-files-found: error

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: RingMod-Standalone-windows
          path: build/RingMod_artefacts/Release/Standalone/RingMod.exe
          if-no-files-found: error

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: RingMod-Installer-windows
          path: RingMod-1.1.0-win64.msi
          if-no-files-found: error
