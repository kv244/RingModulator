name: Lint

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  cppcheck:
    name: cppcheck static analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        # Errors are always reported by default; --enable=warning adds the next
        # tier (potential null deref, uninitialised values, etc.) without the
        # false-positive flood from style/performance checks.
        # JUCE headers are absent on this runner, so suppress the resulting noise.
        run: |
          cppcheck \
            --enable=warning \
            --std=c++17 \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            source/PluginProcessor.cpp \
            source/PluginEditor.cpp
